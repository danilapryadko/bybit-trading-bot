name: Deploy to Fly.io

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'production'
        type: choice
        options:
        - production
        - staging

env:
  FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
  ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}

jobs:
  test:
    name: Run Tests
    uses: ./.github/workflows/test.yml
    
  deploy-backend:
    name: Deploy Backend to Fly.io
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Setup Fly.io CLI
      uses: superfly/flyctl-actions/setup-flyctl@master
      
    - name: Deploy Backend
      run: |
        flyctl deploy \
          --app bybit-danila-bot \
          --config fly.toml \
          --remote-only \
          --strategy rolling
      env:
        FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        
    - name: Check deployment health
      run: |
        flyctl status --app bybit-danila-bot
        flyctl logs --app bybit-danila-bot --recent
        
    - name: Run smoke tests
      run: |
        sleep 30
        curl -f https://bybit-danila-bot.fly.dev/health || exit 1
        echo "Backend deployment successful!"
        
  deploy-dashboard:
    name: Deploy Dashboard to Fly.io
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    
    defaults:
      run:
        working-directory: ./frontend
        
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
        
    - name: Install dependencies
      run: npm ci
      
    - name: Build frontend
      run: npm run build
      env:
        VITE_API_URL: https://bybit-danila-bot.fly.dev
        VITE_WS_URL: wss://bybit-danila-bot.fly.dev
        
    - name: Setup Fly.io CLI
      uses: superfly/flyctl-actions/setup-flyctl@master
      
    - name: Deploy Dashboard
      run: |
        flyctl deploy \
          --app bybit-danila-dashboard \
          --config fly.toml \
          --remote-only
      env:
        FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        
    - name: Check dashboard deployment
      run: |
        flyctl status --app bybit-danila-dashboard
        sleep 30
        curl -f https://bybit-danila-dashboard.fly.dev || exit 1
        echo "Dashboard deployment successful!"
        
  notify-deployment:
    name: Notify Deployment Status
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-dashboard]
    if: always()
    
    steps:
    - name: Send Telegram notification
      if: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: |
        if [ "${{ needs.deploy-backend.result }}" == "success" ] && [ "${{ needs.deploy-dashboard.result }}" == "success" ]; then
          MESSAGE="✅ Deployment successful!%0A%0ABackend: https://bybit-danila-bot.fly.dev%0ADashboard: https://bybit-danila-dashboard.fly.dev%0A%0ACommit: ${{ github.sha }}"
        else
          MESSAGE="❌ Deployment failed!%0A%0ABackend: ${{ needs.deploy-backend.result }}%0ADashboard: ${{ needs.deploy-dashboard.result }}%0A%0ACommit: ${{ github.sha }}"
        fi
        
        curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
          -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
          -d "text=$MESSAGE" \
          -d "parse_mode=HTML"
          
    - name: Create deployment record
      uses: actions/github-script@v6
      with:
        script: |
          const deployment = await github.rest.repos.createDeployment({
            owner: context.repo.owner,
            repo: context.repo.repo,
            ref: context.sha,
            environment: 'production',
            auto_merge: false,
            required_contexts: [],
            description: 'Fly.io deployment'
          });
          
          await github.rest.repos.createDeploymentStatus({
            owner: context.repo.owner,
            repo: context.repo.repo,
            deployment_id: deployment.data.id,
            state: 'success',
            environment_url: 'https://bybit-danila-dashboard.fly.dev',
            description: 'Deployment completed'
          });