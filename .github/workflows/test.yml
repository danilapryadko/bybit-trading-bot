name: Test Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '18'

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        
    - name: Cache Python dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
          
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov pytest-asyncio
        
    - name: Run unit tests
      run: |
        pytest tests/test_comprehensive.py -v --tb=short --cov=. --cov-report=xml --cov-report=term
        
    - name: Test auth service
      run: |
        python -c "from auth_service import AuthService; auth = AuthService(); print('Auth service initialized')"
        
    - name: Test report generator
      run: |
        python -c "from report_generator import ReportGenerator; gen = ReportGenerator(); print('Report generator initialized')"
        
    - name: Test FastAPI app
      run: |
        python -c "from fastapi_app import app; print('FastAPI app loaded')"
        
    - name: Upload coverage reports
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: backend
        name: backend-coverage
        
  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./frontend
        
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
        
    - name: Install dependencies
      run: npm ci
      
    - name: Run TypeScript type check
      run: npm run type-check || npx tsc --noEmit
      
    - name: Build frontend
      run: npm run build
      env:
        CI: true
        
    - name: Check build output
      run: |
        if [ -d "dist" ]; then
          echo "Build successful - dist folder exists"
          ls -la dist/
        else
          echo "Build failed - dist folder not found"
          exit 1
        fi
        
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]
    
    services:
      redis:
        image: redis:alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
          
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        
    - name: Install backend dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install httpx pytest-asyncio
        
    - name: Start FastAPI server
      run: |
        nohup python -m uvicorn fastapi_app:app --host 0.0.0.0 --port 8000 &
        sleep 5
        
    - name: Test API endpoints
      run: |
        curl -f http://localhost:8000/api/v2/health || exit 1
        curl -f http://localhost:8000/api/v2/trading/status || exit 1
        
    - name: Run API integration tests
      run: |
        python -c "
        import httpx
        import asyncio
        
        async def test_api():
            async with httpx.AsyncClient() as client:
                # Test health endpoint
                response = await client.get('http://localhost:8000/api/v2/health')
                assert response.status_code == 200
                assert response.json()['status'] == 'healthy'
                
                # Test trading status
                response = await client.get('http://localhost:8000/api/v2/trading/status')
                assert response.status_code == 200
                
                # Test market tickers
                response = await client.get('http://localhost:8000/api/v2/market/tickers')
                assert response.status_code == 200
                assert 'BTCUSDT' in response.json()
                
                print('All API tests passed!')
                
        asyncio.run(test_api())
        "
        
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        
    - name: Install security tools
      run: |
        pip install bandit safety
        
    - name: Run Bandit security scan
      run: |
        bandit -r . -f json -o bandit-report.json || true
        
    - name: Check for vulnerable dependencies
      run: |
        safety check --json || true
        
    - name: Upload security reports
      uses: actions/upload-artifact@v3
      with:
        name: security-reports
        path: |
          bandit-report.json
          
  docker-build:
    name: Docker Build Test
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
      
    - name: Build Docker image
      uses: docker/build-push-action@v4
      with:
        context: .
        file: ./Dockerfile.fly
        push: false
        tags: bybit-bot:test
        cache-from: type=gha
        cache-to: type=gha,mode=max
        
    - name: Test Docker image
      run: |
        docker run --rm bybit-bot:test python -c "print('Docker image works!')"