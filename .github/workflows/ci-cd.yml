name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # Allows manual trigger

env:
  PYTHON_VERSION: '3.11'
  FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

jobs:
  # 1. Code Quality Checks
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    
    - name: Cache pip packages
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install flake8 black mypy
    
    - name: Run Black formatter check
      run: black --check .
      continue-on-error: true
    
    - name: Run Flake8 linter
      run: flake8 . --exclude=venv,__pycache__ --max-line-length=100
      continue-on-error: true
    
    - name: Run type checking with mypy
      run: mypy . --ignore-missing-imports
      continue-on-error: true

  # 2. Testing
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: quality
    
    services:
      postgres:
        image: postgres:14-alpine
        env:
          POSTGRES_USER: trader
          POSTGRES_PASSWORD: password
          POSTGRES_DB: trading_bot
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov pytest-asyncio
    
    - name: Initialize database
      run: |
        PGPASSWORD=password psql -h localhost -U trader -d trading_bot -f scripts/init_postgres.sql || echo "Database init skipped"
      env:
        DATABASE_URL: postgresql://trader:password@localhost:5432/trading_bot
    
    - name: Run tests with coverage
      run: |
        pytest tests/ -v --cov=. --cov-report=xml --cov-report=html
      env:
        DATABASE_URL: postgresql://trader:password@localhost:5432/trading_bot
        REDIS_URL: redis://localhost:6379
        BYBIT_TESTNET: true
        API_KEY: ${{ secrets.TEST_API_KEY }}
        API_SECRET: ${{ secrets.TEST_API_SECRET }}
    
    - name: Upload coverage reports
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
      continue-on-error: true
    
    - name: Archive test results
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: test-results
        path: |
          coverage.xml
          htmlcov/

  # 3. Security Scanning
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: quality
    steps:
    - uses: actions/checkout@v4
    
    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'
        severity: 'CRITICAL,HIGH'
    
    - name: Upload Trivy results to GitHub Security
      uses: github/codeql-action/upload-sarif@v2
      with:
        sarif_file: 'trivy-results.sarif'
    
    - name: Check for hardcoded secrets
      uses: trufflesecurity/trufflehog@main
      with:
        path: ./
        base: main
        head: HEAD
      continue-on-error: true

  # 4. Build Docker Image
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [test, security]
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Build Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile.fly
        push: false
        tags: bybit-trading-bot:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
    
    - name: Save Docker image
      run: |
        docker save bybit-trading-bot:${{ github.sha }} | gzip > bot-image.tar.gz
    
    - name: Upload Docker image
      uses: actions/upload-artifact@v3
      with:
        name: docker-image
        path: bot-image.tar.gz
        retention-days: 1

  # 5. Deploy to Fly.io (Staging)
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/develop'
    environment: staging
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Fly CLI
      uses: superfly/flyctl-actions/setup-flyctl@master
    
    - name: Deploy to Fly.io Staging
      run: |
        flyctl deploy \
          --app bybit-bot-staging \
          --config fly.toml \
          --dockerfile Dockerfile.fly \
          --strategy rolling \
          --env BYBIT_TESTNET=true \
          --env ENVIRONMENT=staging
      env:
        FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  # 6. Deploy to Fly.io (Production)
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Fly CLI
      uses: superfly/flyctl-actions/setup-flyctl@master
    
    - name: Deploy to Fly.io Production
      run: |
        flyctl deploy \
          --app bybit-trading-bot \
          --config fly.toml \
          --dockerfile Dockerfile.fly \
          --strategy rolling \
          --env ENVIRONMENT=production
      env:
        FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
    
    - name: Health Check
      run: |
        sleep 30
        curl -f https://bybit-trading-bot.fly.dev/health || exit 1
    
    - name: Notify Deployment
      if: success()
      run: |
        echo "✅ Deployment successful!"
        echo "🔗 App URL: https://bybit-trading-bot.fly.dev"
        echo "📊 Status: https://bybit-trading-bot.fly.dev/status"
        echo "📈 Metrics: https://bybit-trading-bot.fly.dev/metrics"

  # 7. Notification
  notify:
    name: Send Notifications
    runs-on: ubuntu-latest
    needs: [deploy-staging, deploy-production]
    if: always()
    steps:
    - name: Send Telegram notification
      if: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      run: |
        MESSAGE="🚀 Deployment Status:
        Repository: ${{ github.repository }}
        Branch: ${{ github.ref_name }}
        Commit: ${{ github.sha }}
        Status: ${{ job.status }}
        Author: ${{ github.actor }}"
        
        curl -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
          -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
          -d "text=${MESSAGE}" \
          -d "parse_mode=Markdown"
      continue-on-error: true
