# GraphQL API Microservice Configuration
app = "bybit-danila-api"
primary_region = "sin"
kill_signal = "SIGINT"
kill_timeout = 5

[build]
  dockerfile = "Dockerfile.graphql"

[env]
  ENVIRONMENT = "production"
  SERVICE_TYPE = "graphql-api"
  USE_MAINNET = "false"
  PORT = "8000"

# HTTP service for GraphQL API
[[services]]
  internal_port = 8000
  protocol = "tcp"
  script_checks = []
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  
  [services.concurrency]
    hard_limit = 100
    soft_limit = 80
    type = "connections"
  
  [[services.ports]]
    force_https = true
    handlers = ["http"]
    port = 80
  
  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443
  
  [[services.http_checks]]
    interval = 10000
    grace_period = "5s"
    method = "get"
    path = "/health"
    protocol = "http"
    timeout = 2000
    
  [[services.tcp_checks]]
    grace_period = "10s"
    interval = "30s"
    restart_limit = 3
    timeout = "5s"

# Machine configuration
[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512