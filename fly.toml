# fly.toml - Configuration for Fly.io deployment
app = "bybit-trading-bot"
primary_region = "sin"  # Singapore - близко к Bybit серверам
kill_signal = "SIGINT"
kill_timeout = 5

[build]
  dockerfile = "Dockerfile.fly"

[env]
  ENVIRONMENT = "production"
  BYBIT_TESTNET = "false"  # Начнем с testnet
  PORT = "8080"

# Основной процесс - торговый бот
[processes]
  bot = "python main.py --strategy adaptive"
  api = "uvicorn web_api:app --host 0.0.0.0 --port 8080"

# Persistent storage для БД и логов
[mounts]
  source = "bot_data"
  destination = "/data"

# HTTP сервис для API и мониторинга
[[services]]
  http_checks = []
  internal_port = 8080
  processes = ["api"]
  protocol = "tcp"
  script_checks = []

  [services.concurrency]
    hard_limit = 25
    soft_limit = 20
    type = "connections"

  [[services.ports]]
    force_https = true
    handlers = ["http"]
    port = 80

  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443

  [[services.tcp_checks]]
    grace_period = "10s"
    interval = "15s"
    restart_limit = 0
    timeout = "2s"

  [[services.http_checks]]
    interval = "10s"
    grace_period = "5s"
    method = "get"
    path = "/health"
    protocol = "http"
    timeout = "2s"
    tls_skip_verify = false
    headers = {}

# Метрики для Prometheus
[[services]]
  internal_port = 9090
  protocol = "tcp"
  processes = ["bot"]
  
  [[services.ports]]
    port = 9090

# Масштабирование
[metrics]
  port = 9090
  path = "/metrics"

# Проверки здоровья
[checks]
  [checks.bot_health]
    type = "http"
    interval = "30s"
    timeout = "5s"
    method = "GET"
    path = "/health"
    port = 8080

# Переменные окружения (чувствительные данные добавляются через fly secrets)
# fly secrets set API_KEY=xxx API_SECRET=yyy
