# fly.toml - Configuration for Fly.io deployment
app = "bybit-danila-bot"
primary_region = "sin"  # Singapore - близко к Bybit серверам
kill_signal = "SIGINT"
kill_timeout = 5

[build]
  dockerfile = "Dockerfile.fly"

[env]
  ENVIRONMENT = "production"
  BYBIT_TESTNET = "true"
  PORT = "8080"
  PAPER_TRADING = "true"
  INITIAL_CAPITAL = "10000"
  MAX_POSITIONS = "3"
  RISK_PER_TRADE = "1.0"

# Основной процесс - торговый бот с Telegram + GraphQL
[processes]
  bot = "python start_with_graphql.py"

# Persistent storage для БД и логов
[mounts]
  source = "bot_data"
  destination = "/data"

# HTTP service for GraphQL API and WebSocket
[[services]]
  http_checks = []
  internal_port = 8000
  processes = ["bot"]  # Link to bot process
  protocol = "tcp"
  script_checks = []
  
  [services.concurrency]
    hard_limit = 25
    soft_limit = 20
    type = "connections"
  
  [[services.ports]]
    force_https = true
    handlers = ["http"]
    port = 80
  
  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443
  
  [[services.tcp_checks]]
    grace_period = "1s"
    interval = "15s"
    restart_limit = 0
    timeout = "2s"

# WebSocket service
[[services]]
  http_checks = []
  internal_port = 8001
  processes = ["bot"]
  protocol = "tcp"
  
  [[services.ports]]
    handlers = ["tls", "http"]
    port = 8001